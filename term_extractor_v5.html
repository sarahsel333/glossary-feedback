<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PPT 용어 추출기 v5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#F7F6F3;color:#1e293b;min-height:100vh;font-size:14px}
.wrap{max-width:1100px;margin:0 auto;padding:28px 32px 60px}
h1{font-size:20px;font-weight:800;margin-bottom:4px}
.sub{font-size:13px;color:#64748b;margin-bottom:20px}
.tabs{display:flex;gap:0;border-bottom:2px solid #e2e8f0;margin-bottom:22px}
.tab{padding:10px 22px;border:none;background:none;cursor:pointer;font-weight:400;font-size:13px;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .12s}
.tab.active{font-weight:700;color:#6366f1;border-bottom:2px solid #6366f1}
.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:18px 20px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:700;color:#374151;margin-bottom:10px}
.upload-zone{display:flex;align-items:center;gap:12px;padding:14px 16px;border:2px dashed #cbd5e1;border-radius:10px;cursor:pointer;background:#f8fafc;transition:all .12s}
.upload-zone.filled{border:2px solid #6366f1;background:#f0f4ff}
.upload-label{font-weight:700;font-size:13px}
.upload-hint{font-size:11px;color:#94a3b8;margin-top:2px}
input[type=text],input[type=password],input[type=number],input[type=datetime-local],select,textarea{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-family:inherit;font-size:13px;color:#1e293b;background:#fff;outline:none;transition:border .12s}
input:focus,select:focus,textarea:focus{border-color:#6366f1}
textarea{resize:vertical;min-height:60px}
.btn{height:36px;padding:0 18px;border-radius:8px;border:1.5px solid #e2e8f0;background:#fff;color:#374151;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .12s;white-space:nowrap}
.btn:hover{background:#f1f5f9}
.btn.primary{background:#6366f1;color:#fff;border-color:#6366f1}
.btn.primary:hover{background:#4f46e5}
.btn.primary:disabled{background:#cbd5e1;border-color:#cbd5e1;cursor:not-allowed}
.btn.green{background:#10b981;color:#fff;border-color:#10b981}
.btn.green:hover{background:#059669}
.btn.red{background:#fff;color:#b91c1c;border-color:#fca5a5}
.btn.red:hover{background:#fef2f2}
.btn.sm{height:30px;padding:0 12px;font-size:12px}
.term-card{background:#fff;border-radius:10px;border:1.5px solid #e2e8f0;padding:14px 16px;margin-bottom:8px;transition:border .15s}
.term-card.approved{border-color:#a7f3d0;background:#f0fdf4}
.term-card.rejected{border-color:#fca5a5;opacity:.45}
.term-pair{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.term-source{font-weight:700;font-size:14px}
.term-arrow{color:#6366f1;font-size:13px;font-weight:600}
.term-meta{font-size:11px;color:#94a3b8;margin-top:3px}
.pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap}
.pill-purple{background:#ede9fe;color:#5b21b6}
.pill-gray{background:#f1f5f9;color:#475569}
.stat-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.stat{flex:1;min-width:80px;text-align:center;padding:10px 8px;background:#f8fafc;border-radius:8px;border:1.5px solid #e2e8f0}
.stat-val{font-size:20px;font-weight:800}
.stat-lbl{font-size:11px;color:#94a3b8;margin-top:2px}
.tbl-wrap{overflow-x:auto;border:1px solid #e2e8f0;border-radius:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#f8fafc}
th{padding:9px 12px;text-align:left;font-weight:600;color:#64748b;border-bottom:1px solid #e2e8f0;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid #f1f5f9;vertical-align:top}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#fafafa}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-good{background:#d1fae5;color:#065f46}
.badge-warn{background:#fef3c7;color:#92400e}
.badge-bad{background:#fee2e2;color:#991b1b}
.badge-na{background:#f1f5f9;color:#475569}
.icon-btn{background:none;border:none;cursor:pointer;color:#94a3b8;padding:3px 5px;border-radius:4px;font-size:14px}
.icon-btn:hover{background:#f1f5f9;color:#374151}
.icon-btn.del:hover{color:#b91c1c}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;border:1px solid #e2e8f0;width:520px;max-width:100%;max-height:90vh;overflow-y:auto;padding:22px}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-grid.full{grid-template-columns:1fr}
.field label{font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:4px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid #f1f5f9}
.fb-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:16px}
.fb-stat{background:#f8fafc;border-radius:8px;padding:12px 14px;border:1px solid #e2e8f0}
.fb-stat-label{font-size:11px;color:#64748b;margin-bottom:4px}
.fb-stat-val{font-size:22px;font-weight:700;color:#1e293b}
.loading-bar{width:100%;height:4px;background:#e2e8f0;border-radius:99px;overflow:hidden;margin-top:10px}
.loading-fill{height:100%;width:40%;background:#6366f1;border-radius:99px;animation:slide 1.2s ease-in-out infinite}
@keyframes slide{0%{margin-left:-40%}100%{margin-left:100%}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#18181b;color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1}
.empty{padding:40px;text-align:center;color:#94a3b8;font-size:13px}
.error-box{padding:12px 14px;border-radius:8px;background:#fef2f2;border:1px solid #fca5a5;color:#991b1b;font-size:12px;line-height:1.6;margin-bottom:12px}
.info-box{padding:12px 14px;border-radius:8px;background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;font-size:12px;line-height:1.6;margin-bottom:12px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.spacer{flex:1}
</style>
</head>
<body>
<div class="wrap">
  <h1>📋 PPT 용어 추출기</h1>
  <p class="sub">PPT 업로드 → AI 용어 추출 → 승인/제외 → 피드백 기록</p>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('extract')">🔍 용어 추출</button>
    <button class="tab" onclick="switchTab('glossary')">📚 용어집</button>
    <button class="tab" onclick="switchTab('feedback')">📊 피드백 트래커</button>
  </div>
  <div id="tab-extract">
    <div class="card">
      <div class="card-title">AI 설정</div>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <button id="btn-anthropic" class="btn primary sm" onclick="setProvider('anthropic')">Anthropic</button>
        <button id="btn-openai" class="btn sm" onclick="setProvider('openai')">OpenAI</button>
      </div>
      <div style="display:flex;gap:8px">
        <input type="password" id="api-key" placeholder="API 키 입력 (브라우저에만 저장됩니다)" style="flex:1"/>
        <button class="btn sm" onclick="saveKey()">저장</button>
      </div>
      <div id="key-status" style="font-size:11px;color:#94a3b8;margin-top:6px"></div>
    </div>
    <div class="card">
      <div class="card-title">파일 업로드</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <label id="zone-src" class="upload-zone" for="file-src">
          <input type="file" id="file-src" accept=".pptx" style="display:none" onchange="handleFile(this,'src')"/>
          <span style="font-size:22px;opacity:.4">📂</span>
          <div><div class="upload-label" id="src-label" style="color:#6366f1">원문 PPT (EN)</div><div class="upload-hint" id="src-hint">.pptx 파일 선택</div></div>
          <button id="src-remove" style="display:none;margin-left:auto" class="btn sm red" onclick="removeFile(event,'src')">✕</button>
        </label>
        <label id="zone-tgt" class="upload-zone" for="file-tgt">
          <input type="file" id="file-tgt" accept=".pptx" style="display:none" onchange="handleFile(this,'tgt')"/>
          <span style="font-size:22px;opacity:.4">📂</span>
          <div><div class="upload-label" id="tgt-label" style="color:#0ea5e9">번역 PPT (KO)</div><div class="upload-hint" id="tgt-hint">.pptx 파일 선택</div></div>
          <button id="tgt-remove" style="display:none;margin-left:auto" class="btn sm red" onclick="removeFile(event,'tgt')">✕</button>
        </label>
        <input type="text" id="project-title" placeholder="프로젝트명 (예: Windless)"/>
      </div>
    </div>
    <div class="card" style="display:flex;align-items:center;justify-content:space-between;gap:12px">
      <div>
        <div style="font-weight:700;font-size:14px;margin-bottom:3px">글로서리 추출</div>
        <div id="cta-hint" style="font-size:12px;color:#94a3b8">원문과 번역 파일을 먼저 업로드하세요.</div>
      </div>
      <button id="btn-extract" class="btn primary" onclick="startExtraction()" disabled>추출 실행</button>
    </div>
    <div id="loading" style="display:none" class="info-box">
      <div id="load-msg">AI 분석 중...</div>
      <div class="loading-bar"><div class="loading-fill"></div></div>
    </div>
    <div id="extract-error" class="error-box" style="display:none"></div>
    <div id="candidate-section" style="display:none">
      <div class="stat-row" id="stats-row"></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
        <button class="btn sm" onclick="filterCandidates('all')">전체</button>
        <button class="btn sm" onclick="filterCandidates('pending')">대기</button>
        <button class="btn sm" onclick="filterCandidates('approved')">승인</button>
        <button class="btn sm" onclick="filterCandidates('rejected')">제외</button>
        <div style="flex:1"></div>
        <button class="btn sm green" onclick="approveAll()">전체 승인</button>
        <button class="btn sm red" onclick="rejectAll()">전체 제외</button>
        <button class="btn sm primary" onclick="saveToGlossary()">용어집에 저장</button>
      </div>
      <div id="candidate-list"></div>
    </div>
  </div>
  <div id="tab-glossary" style="display:none">
    <div id="glossary-empty" class="empty"><div style="font-size:32px;margin-bottom:8px">📭</div>아직 저장된 용어가 없어요.</div>
    <div id="glossary-content" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span id="glossary-count" style="font-size:13px;color:#64748b"></span>
        <div style="display:flex;gap:8px">
          <button class="btn sm" onclick="exportCSV()">📥 CSV 내보내기</button>
          <button class="btn sm red" onclick="clearGlossary()">🗑 전체 삭제</button>
        </div>
      </div>
      <div id="glossary-list"></div>
    </div>
  </div>
  <div id="tab-feedback" style="display:none">
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">📊 구글 시트 자동 저장</div>
      <div style="font-size:12px;color:#64748b;margin-bottom:10px">피드백 저장 시 구글 시트에 자동으로 행이 추가됩니다.</div>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="text" id="sheets-url" placeholder="https://script.google.com/macros/s/..." style="flex:1;font-size:12px"/>
        <button class="btn sm" onclick="saveSheetUrl()">저장</button>
        <button class="btn sm" onclick="testSheetUrl()">연결 테스트</button>
      </div>
      <div id="sheets-status" style="font-size:11px;margin-top:6px;color:#94a3b8"></div>
    </div>
    <div class="fb-stats">
      <div class="fb-stat"><div class="fb-stat-label">총 세션</div><div class="fb-stat-val" id="fs-total">0</div></div>
      <div class="fb-stat"><div class="fb-stat-label">파일 종류</div><div class="fb-stat-val" id="fs-files">0</div></div>
      <div class="fb-stat"><div class="fb-stat-label">평균 용어 수</div><div class="fb-stat-val" id="fs-avg">—</div></div>
      <div class="fb-stat"><div class="fb-stat-label">원하는 용어 추출률</div><div class="fb-stat-val" id="fs-hit">—</div></div>
    </div>
    <div class="toolbar">
      <input type="text" id="fb-filter-file" placeholder="파일명 검색…" oninput="renderFeedback()" style="width:160px"/>
      <select id="fb-filter-tester" onchange="renderFeedback()" style="width:auto"><option value="">전체 테스터</option></select>
      <select id="fb-filter-wanted" onchange="renderFeedback()" style="width:auto">
        <option value="">원하는 용어 — 전체</option>
        <option value="yes">예</option><option value="partial">일부</option><option value="no">아니오</option>
      </select>
      <div class="spacer"></div>
      <button class="btn sm" onclick="exportFeedbackCSV()">📥 CSV</button>
      <button class="btn sm primary" onclick="openFeedbackModal()">+ 결과 추가</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <colgroup><col style="min-width:150px"><col style="width:70px"><col style="width:48px"><col style="width:52px"><col style="width:70px"><col style="width:75px"><col style="width:75px"><col style="width:60px"><col><col style="width:56px"></colgroup>
        <thead><tr><th>파일명</th><th>테스터</th><th>회차</th><th>용어 수</th><th>일관성</th><th>원하는 용어</th><th>AI</th><th>파일 종류</th><th>누락 / 불필요 / 개선 의견</th><th></th></tr></thead>
        <tbody id="fb-tbody"></tbody>
      </table>
      <div class="empty" id="fb-empty">아직 기록된 결과가 없습니다.</div>
    </div>
  </div>
</div>
<div class="modal-bg" id="fb-modal" onclick="modalOverlayClick(event)">
  <div class="modal">
    <h3 id="fb-modal-title">새 결과 추가</h3>
    <div class="form-grid">
      <div class="field"><label>파일명 *</label><input type="text" id="fm-file" placeholder="예: Windless_KR.pptx" oninput="onFileInputChange(this.value)"/></div>
      <div class="field"><label>테스터 *</label><input type="text" id="fm-tester" placeholder="예: 김민준"/></div>
    </div>
    <div class="form-grid">
      <div class="field"><label>회차</label><input type="number" id="fm-run" min="1" value="1"/></div>
      <div class="field"><label>추출된 용어 수</label><input type="number" id="fm-cnt" min="0" placeholder="예: 36"/></div>
    </div>
    <div class="form-grid">
      <div class="field"><label>파일 종류</label><select id="fm-filetype"><option value="">선택</option><option value="game">게임 덱</option><option value="hr">HR / 평가</option><option value="invest">투자 자료</option><option value="tech">기술 문서</option><option value="other">기타</option></select></div>
      <div class="field"><label>AI 제공자</label><select id="fm-provider"><option value="Anthropic">Anthropic</option><option value="OpenAI">OpenAI</option></select></div>
    </div>
    <div class="form-grid">
      <div class="field"><label>회차 간 일관성</label><select id="fm-consist"><option value="na">첫 실행 (비교 불가)</option><option value="same">동일</option><option value="minor">소폭 차이 (±2 이하)</option><option value="diff">큰 차이 (±3 이상)</option></select></div>
      <div class="field"><label>원하는 용어 추출 여부</label><select id="fm-wanted"><option value="yes">예 — 잘 추출됨</option><option value="partial">일부 — 일부 누락</option><option value="no">아니오 — 원하는 용어 없음</option></select></div>
    </div>
    <div class="form-grid full"><div class="field"><label>날짜 / 시간</label><input type="datetime-local" id="fm-date"/></div></div>
    <div class="form-grid full"><div class="field"><label>누락된 용어 <span style="color:#94a3b8;font-weight:400">(있어야 하는데 안 나온 것)</span></label><textarea id="fm-missing" placeholder="예: Hero King, Dynamic LOD system"></textarea></div></div>
    <div class="form-grid full"><div class="field"><label>불필요하게 추출된 용어 <span style="color:#94a3b8;font-weight:400">(나오면 안 되는데 나온 것)</span></label><textarea id="fm-unnecessary" placeholder="예: Western market, Full Production"></textarea></div></div>
    <div class="form-grid full"><div class="field"><label>개선 제안 <span style="color:#94a3b8;font-weight:400">(프롬프트 개선에 활용)</span></label><textarea id="fm-memo" placeholder="예: 게임 고유명사는 잘 나오나 HR 용어 누락이 많음"></textarea></div></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeFeedbackModal()">취소</button>
      <button class="btn primary" onclick="saveFeedbackEntry()">저장</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
  const MODEL_ANTHROPIC="claude-sonnet-4-6";
const MODEL_OPENAI="gpt-4.1";
const BATCH_SIZE=60;
const SLIDE_LIMIT=1200;
const NUMBERS_ONLY=/^[\d\s,.%+\-x×*\/()]+$/;
const CATEGORIES=["기술/보안","게임 서비스/운영","게임 일반","HR/조직운영","IP/콘텐츠","공간/시설","법무/계약","AI/개발/툴"];
const GENERIC_PAIR_RE=[/^mass\s+entity\s+tech\|mass\s+entity\s+기술$/i,/^playable\s+demo\|플레이어블\s+데모$/i,/^pre[-\s]?production\|프리\s+프로덕션$/i,/^full\s+production\|풀\s+프로덕션$/i,/^korean\s+fantasy\|한국적\s+판타지$/i,/^publishing\|퍼블리싱$/i,/^new\s+ip\|신규\s+ip$/i,/^(main|vip|regional|world)\s+quest\|.*퀘스트$/i];
const CONSIST_LABEL={na:"첫 실행",same:"동일",minor:"소폭 차이",diff:"큰 차이"};
const CONSIST_CLS={na:"badge-na",same:"badge-good",minor:"badge-warn",diff:"badge-bad"};
const WANTED_LABEL={yes:"예",partial:"일부",no:"아니오"};
const WANTED_CLS={yes:"badge-good",partial:"badge-warn",no:"badge-bad"};
const FILETYPE_LABEL={game:"게임 덱",hr:"HR/평가",invest:"투자 자료",tech:"기술 문서",other:"기타"};
const SHEETS_URL_KEY="fb_sheets_url";

let provider=localStorage.getItem("fb_provider")||"anthropic";
let candidates=[],decisions={};
let glossary=JSON.parse(localStorage.getItem("fb_glossary")||"[]");
let fbEntries=JSON.parse(localStorage.getItem("fb_entries")||"[]");
let fbEditId=null;
let srcFile,tgtFile,srcText="",tgtText="";
let curFilter="all";

const norm=v=>String(v||"").trim().toLowerCase().replace(/\s+/g," ");
const hasHangul=v=>/[\uac00-\ud7a3]/.test(v);
const normQ=v=>String(v||"").replace(/[\u200B-\u200D\uFEFF]/g,"").toLowerCase().replace(/[^a-z0-9\uac00-\ud7a3]/g," ").replace(/\s+/g," ").trim();
const isAcr=v=>/^[A-Z0-9][A-Z0-9\-]{1,10}$/.test(String(v||"").trim());

function saveFbEntries(){localStorage.setItem("fb_entries",JSON.stringify(fbEntries));}

function isFatal(src,tgt){
  const s=String(src||"").trim(),t=String(tgt||"").trim();
  if(!s||!t)return true;
  if(!hasHangul(t)&&!isAcr(t))return true;
  const qs=normQ(s),qt=normQ(t);
  if(qs===qt)return true;
  if(s.replace(/\s/g,"").toLowerCase()===t.replace(/\s/g,"").toLowerCase())return true;
  const pair=`${qs}|${qt}`;

async function inflate(data){
  try{
    const ds=new DecompressionStream("deflate-raw");
    const w=ds.writable.getWriter();w.write(data);w.close();
    const chunks=[];const r=ds.readable.getReader();
    while(true){const{done,value}=await r.read();if(done)break;chunks.push(value);}
    const total=chunks.reduce((n,c)=>n+c.length,0);
    const out=new Uint8Array(total);let off=0;
    for(const c of chunks){out.set(c,off);off+=c.length;}
    return out;
  }catch{return null;}
}

async function extractPPTX(file,label){
  const bytes=new Uint8Array(await file.arrayBuffer());
  const dec=new TextDecoder("utf-8");
  const slides={};let i=0;
  while(i<bytes.length-30){
    if(bytes[i]===0x50&&bytes[i+1]===0x4B&&bytes[i+2]===0x03&&bytes[i+3]===0x04){
      const comp=bytes[i+8]|(bytes[i+9]<<8);
      const csz=bytes[i+18]|(bytes[i+19]<<8)|(bytes[i+20]<<16)|(bytes[i+21]<<24);
      const fnl=bytes[i+26]|(bytes[i+27]<<8);
      const exl=bytes[i+28]|(bytes[i+29]<<8);
      const ds=i+30+fnl+exl;
      const fn=dec.decode(bytes.slice(i+30,i+30+fnl));
      const m=fn.match(/^ppt\/slides\/slide(\d+)\.xml$/);
      if(m){
        const raw=bytes.slice(ds,ds+csz);
        let xml="";
        if(comp===0)xml=dec.decode(raw);
        else if(comp===8){const d=await inflate(raw);if(d)xml=dec.decode(d);}
        if(xml){
          const boxes=[];
          const boxRe=/(?:p|a):txBody[\s\S]*?<\/(?:p|a):txBody>/g;
          let bm;
          while((bm=boxRe.exec(xml))!==null){
            const texts=[];
            const re=/<a:t(?:\s[^>]*)?>([^<]*)<\/a:t>/g;let mt;
            while((mt=re.exec(bm[0]))!==null){const t=mt[1].trim();if(t)texts.push(t);}
            const j=texts.join(" ").trim();if(j)boxes.push(j);
          }
          if(boxes.length)slides[parseInt(m[1])]=boxes;
        }
      }
      i=ds+(csz>0?csz:1);
    }else i++;
  }
  return Object.keys(slides).map(Number).sort((a,b)=>a-b).map(n=>`[S${n}] ${label}: ${slides[n].join(" | ")}`).join("\n");
}

function buildPrompt(cats){return `Bilingual terminology extractor for a translation team.

# CORE PRINCIPLES
## 1. STRICT VALIDATION

## Extract
[S1] EN: Rekon 종족의 전설 | KO: Legend of the Rekon race
{"source":"Rekon","target":"레콘","ref":"S1","context":"Rekon 종족 / Rekon race","reason":"세계관 고유 종족명","aiCategory":"IP/콘텐츠"}

If the slide content supports them, include candidates similar to: Hero King/영웅왕, Rekon/레콘, Arajit Kingdom/아라짓 왕국, God of War/갓오브워, Black Myth Wukong/검은 신화: 오공, Elden Ring/엘든링, TBTDT/눈물을 마시는 새, Torren/토렌, Nari/나리, Tokebi/도깨비, Isora/이소라, Rovis/로비스, Jeramir/제라미르, Yathor/아소르, Orusin/어르신, Stronghold/요새, Survivor Camp/생존자 야영지, Secret Cache/은닉처, Underground Ruin/지하 폐허, Skyray/하늘치, Single Blade/하나의 검, Dual Parakis/쌍검 바라기, Halberd/미늘창, Crawan Boomerang/계명성 부메랑, Dragon Summon/용 소환, Rekon Sprint/레콘 질주, Beetle Glide/딱정벌레 활공, Nhaga/나가, Kamikaze/가미가제, Thorn Whip Grunt/가시 채찍 졸개, Mind Manipulator/정신 억압자, Thorn Master/가시의 주인, Mobile Siege Weapon/이동식 공성 병기, Poisonous Flower/독성 꽃, Legendary Battle/레전더리 배틀, Open-World Action RPG/오픈월드 액션 RPG, Dynamic LOD system/다이내믹 LOD 시스템.

function cleanText(t){return t.split(/\s+/).filter(c=>!NUMBERS_ONLY.test(c)).join(" ").replace(/\s+/g," ").trim();}
function buildBatches(src,tgt){
  const enSlides={},koSlides={};
  for(const line of src.split(/\r?\n/)){const m=line.match(/^\[S(\d+)\]\s*(?:[A-Z]{2,4}:\s*)?(.*)$/i);if(m){const n=Number(m[1]);(enSlides[n]=enSlides[n]||[]).push(cleanText(m[2]||""));}}
  for(const line of tgt.split(/\r?\n/)){const m=line.match(/^\[S(\d+)\]\s*(?:[A-Z]{2,4}:\s*)?(.*)$/i);if(m){const n=Number(m[1]);(koSlides[n]=koSlides[n]||[]).push(cleanText(m[2]||""));}}
  const nums=[...new Set([...Object.keys(enSlides),...Object.keys(koSlides)])].map(Number).sort((a,b)=>a-b);
  if(!nums.length)return[[`[S1]\nEN: ${src.slice(0,6000)}\nKO: ${tgt.slice(0,6000)}`]];
  const blocks=nums.map(n=>{const en=cleanText((enSlides[n]||[]).join(" | ")).slice(0,SLIDE_LIMIT);const ko=cleanText((koSlides[n]||[]).join(" | ")).slice(0,SLIDE_LIMIT);return `[S${n}]\nEN: ${en}\nKO: ${ko}`;}).filter(b=>/EN:\s*\S/.test(b)||/KO:\s*\S/.test(b));
  const batches=[];for(let i=0;i<blocks.length;i+=BATCH_SIZE)batches.push(blocks.slice(i,i+BATCH_SIZE));return batches;
}
function normalizeItems(items,bi){return items.filter(x=>x&&x.source&&x.target).map((x,i)=>({id:`c-${Date.now()}-${bi}-${i}`,source:String(x.source||"").trim(),target:String(x.target||"").trim(),ref:String(x.ref||"").trim(),context:x.context||"",reason:x.reason||"",aiCategory:CATEGORIES.includes(x.aiCategory)?x.aiCategory:"게임 일반"})).filter(x=>!isFatal(x.source,x.target));}
function dedupeItems(items){const seen=new Set();return items.filter(x=>{const k=`${normQ(x.source)}|${normQ(x.target)}`;if(seen.has(k))return false;seen.add(k);return true;});}
function parseJson(text){const clean=text.trim().replace(/^```json\s*/i,"").replace(/^```\s*/i,"").replace(/```$/i,"").trim();const s=clean.indexOf("[");if(s===-1)return[];let j=clean.slice(s);const e=j.lastIndexOf("]");if(e!==-1){try{const p=JSON.parse(j.slice(0,e+1));return Array.isArray(p)?p:[];}catch{}}const lc=j.lastIndexOf("},");if(lc!==-1)j=j.slice(0,lc+1)+"]";else{const lo=j.lastIndexOf("}");if(lo!==-1)j=j.slice(0,lo+1)+"]";}try{return JSON.parse(j);}catch{return[];}}

async function callBatch(slideBlocks,bi,total){
  const prompt=`${buildPrompt(CATEGORIES)}\n\nBATCH: ${bi+1}/${total}\n\nSLIDES:\n${slideBlocks.join("\n")}`;
  if(provider==="openai"){
    const res=await fetch("https://api.openai.com/v1/responses",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+getKey()},body:JSON.stringify({model:MODEL_OPENAI,input:prompt,temperature:0,max_output_tokens:8192,store:false})});
    const data=await res.json();if(!res.ok)throw new Error(data.error?.message||"OpenAI 오류");
    return normalizeItems(parseJson((data.output||[]).flatMap(x=>x.content||[]).map(x=>x.text||"").join("")),bi);
  }else{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":getKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:MODEL_ANTHROPIC,max_tokens:8192,temperature:0,messages:[{role:"user",content:prompt}]})});
    const data=await res.json();if(!res.ok)throw new Error(data.error?.message||"Claude 오류");
    return normalizeItems(parseJson((data.content||[]).map(b=>b.text||"").join("")),bi);
  }
}

function rejectAll(){candidates.forEach(c=>{decisions[c.id]="rejected";});renderCandidates();showToast("전체 제외");}
function saveToGlossary(){const approved=candidates.filter(c=>decisions[c.id]==="approved");if(!approved.length){showToast("승인된 용어가 없습니다");return;}const existing=new Set(glossary.map(g=>norm(g.source)));const newTerms=approved.filter(c=>!existing.has(norm(c.source))).map(c=>({source:c.source,target:c.target,category:c.aiCategory}));glossary=[...glossary,...newTerms];localStorage.setItem("fb_glossary",JSON.stringify(glossary));showToast(`${newTerms.length}개 저장 (중복 ${approved.length-newTerms.length}개 제외)`);candidates=[];decisions={};document.getElementById("candidate-section").style.display="none";}
function renderGlossary(){const empty=document.getElementById("glossary-empty");const content=document.getElementById("glossary-content");if(!glossary.length){empty.style.display="block";content.style.display="none";return;}empty.style.display="none";content.style.display="block";document.getElementById("glossary-count").innerHTML=`총 <b style="color:#1e293b">${glossary.length}</b>개 용어`;document.getElementById("glossary-list").innerHTML=glossary.map((t,i)=>`<div style="display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;background:#f8fafc;border:1.5px solid #e2e8f0;margin-bottom:6px"><div style="flex:1"><span style="font-weight:700;font-size:13px">${esc(t.source)}</span><span style="color:#cbd5e1;font-size:12px;margin:0 6px">→</span><span style="font-size:13px;color:#374151">${esc(t.target)}</span>${t.category?`<span class="pill pill-gray" style="margin-left:8px">${esc(t.category)}</span>`:""}</div><button class="btn sm red" onclick="deleteTerm(${i})">✕</button></div>`).join("");}
function deleteTerm(i){glossary.splice(i,1);localStorage.setItem("fb_glossary",JSON.stringify(glossary));renderGlossary();}
function clearGlossary(){if(!confirm("전체 용어를 삭제할까요?"))return;glossary=[];localStorage.setItem("fb_glossary","[]");renderGlossary();showToast("전체 삭제됨");}
function exportCSV(){const rows=[["Source","Korean","Category"],...glossary.map(t=>[t.source,t.target,t.category||""])];const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");dl("\uFEFF"+csv,"용어집_"+new Date().toISOString().slice(0,10)+".csv","text/csv;charset=utf-8");showToast("CSV 내보내기 완료");}
function dl(content,name,type){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();}
function formatDatetime(val){if(!val)return"";const d=new Date(val);if(isNaN(d.getTime()))return val;return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;}
function nowDatetime(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}T${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;}
function autoRunNumber(filename){if(!filename)return 1;return fbEntries.filter(e=>e.file===filename).length+1;}
function onFileInputChange(val){if(fbEditId)return;const run=autoRunNumber(val.trim());document.getElementById("fm-run").value=run;document.getElementById("fm-consist").value=run===1?"na":"same";}
function renderFeedbackStats(){document.getElementById("fs-total").textContent=fbEntries.length;document.getElementById("fs-files").textContent=new Set(fbEntries.map(e=>e.file)).size;const wc2=fbEntries.filter(e=>e.cnt!==null&&e.cnt!==undefined);document.getElementById("fs-avg").textContent=wc2.length?Math.round(wc2.reduce((a,e)=>a+e.cnt,0)/wc2.length):"—";document.getElementById("fs-hit").textContent=fbEntries.length?Math.round(fbEntries.filter(e=>e.wanted==="yes").length/fbEntries.length*100)+"%":"—";}
function populateTesterFilter(){const sel=document.getElementById("fb-filter-tester");const cur=sel.value;const testers=[...new Set(fbEntries.map(e=>e.tester))].sort();sel.innerHTML='<option value="">전체 테스터</option>'+testers.map(t=>`<option value="${esc(t)}">${esc(t)}</option>`).join("");if(testers.includes(cur))sel.value=cur;}
function renderFeedback(){populateTesterFilter();const fFile=document.getElementById("fb-filter-file").value.toLowerCase();const fTester=document.getElementById("fb-filter-tester").value;const fWanted=document.getElementById("fb-filter-wanted").value;const rows=fbEntries.filter(e=>{if(fFile&&!e.file.toLowerCase().includes(fFile))return false;if(fTester&&e.tester!==fTester)return false;if(fWanted&&e.wanted!==fWanted)return false;return true;}).sort((a,b)=>b.id-a.id);document.getElementById("fb-empty").style.display=fbEntries.length?"none":"block";document.getElementById("fb-tbody").innerHTML=rows.map(e=>`<tr><td style="max-width:160px"><div style="font-weight:600;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(e.file)}">${esc(e.file)}</div><div style="font-size:10px;color:#94a3b8;white-space:nowrap">${formatDatetime(e.date)}</div></td><td>${esc(e.tester)}</td><td style="text-align:center">${e.run}회</td><td style="text-align:center;font-weight:600">${e.cnt!==null&&e.cnt!==undefined?e.cnt:"—"}</td><td><span class="badge ${CONSIST_CLS[e.consist]}">${CONSIST_LABEL[e.consist]}</span></td><td><span class="badge ${WANTED_CLS[e.wanted]}">${WANTED_LABEL[e.wanted]}</span></td><td style="font-size:11px;color:#64748b">${esc(e.provider)}</td><td style="font-size:11px;color:#64748b">${e.filetype?esc(FILETYPE_LABEL[e.filetype]||e.filetype):"—"}</td><td>${e.missing?`<div style="font-size:11px;margin-bottom:3px"><span style="color:#b91c1c;font-weight:600">누락:</span> ${esc(e.missing)}</div>`:""}${e.unnecessary?`<div style="font-size:11px;margin-bottom:3px"><span style="color:#d97706;font-weight:600">불필요:</span> ${esc(e.unnecessary)}</div>`:""}${e.memo?`<div style="font-size:11px"><span style="color:#6366f1;font-weight:600">제안:</span> ${esc(e.memo)}</div>`:""}${!e.missing&&!e.unnecessary&&!e.memo?`<span style="color:#94a3b8;font-size:11px">—</span>`:""}</td><td style="white-space:nowrap"><button class="icon-btn" onclick="editFeedback(${e.id})">✏️</button><button class="icon-btn del" onclick="deleteFeedback(${e.id})">🗑</button></td></tr>`).join("");}
function openFeedbackModal(id){fbEditId=id??null;document.getElementById("fb-modal-title").textContent=id?"결과 수정":"새 결과 추가";if(id){const e=fbEntries.find(x=>x.id===id);document.getElementById("fm-file").value=e.file;document.getElementById("fm-tester").value=e.tester;document.getElementById("fm-run").value=e.run;document.getElementById("fm-cnt").value=e.cnt??"";document.getElementById("fm-filetype").value=e.filetype||"";document.getElementById("fm-consist").value=e.consist;document.getElementById("fm-wanted").value=e.wanted;document.getElementById("fm-provider").value=e.provider;document.getElementById("fm-date").value=e.date||"";document.getElementById("fm-missing").value=e.missing||"";document.getElementById("fm-unnecessary").value=e.unnecessary||"";document.getElementById("fm-memo").value=e.memo||"";}else{const defaultFile=srcFile?srcFile.name:"";document.getElementById("fm-file").value=defaultFile;document.getElementById("fm-tester").value="";document.getElementById("fm-run").value=autoRunNumber(defaultFile);document.getElementById("fm-cnt").value=candidates.length||"";document.getElementById("fm-filetype").value="";document.getElementById("fm-consist").value=autoRunNumber(defaultFile)===1?"na":"same";document.getElementById("fm-wanted").value="yes";document.getElementById("fm-provider").value=provider==="openai"?"OpenAI":"Anthropic";document.getElementById("fm-date").value=nowDatetime();document.getElementById("fm-missing").value="";document.getElementById("fm-unnecessary").value="";document.getElementById("fm-memo").value="";}document.getElementById("fb-modal").classList.add("open");}
function closeFeedbackModal(){document.getElementById("fb-modal").classList.remove("open");}
function modalOverlayClick(e){if(e.target===document.getElementById("fb-modal"))closeFeedbackModal();}
function editFeedback(id){openFeedbackModal(id);}
function deleteFeedback(id){if(!confirm("삭제할까요?"))return;fbEntries=fbEntries.filter(x=>x.id!==id);saveFbEntries();renderFeedbackStats();renderFeedback();showToast("삭제되었습니다");}
function saveFeedbackEntry(){
  const file=document.getElementById("fm-file").value.trim();
  const tester=document.getElementById("fm-tester").value.trim();
  if(!file||!tester){alert("파일명과 테스터 이름은 필수입니다.");return;}
  const entry={id:fbEditId??Date.now(),file,tester,run:parseInt(document.getElementById("fm-run").value)||1,cnt:document.getElementById("fm-cnt").value===""?null:parseInt(document.getElementById("fm-cnt").value),filetype:document.getElementById("fm-filetype").value,consist:document.getElementById("fm-consist").value,wanted:document.getElementById("fm-wanted").value,provider:document.getElementById("fm-provider").value,date:document.getElementById("fm-date").value,missing:document.getElementById("fm-missing").value.trim(),unnecessary:document.getElementById("fm-unnecessary").value.trim(),memo:document.getElementById("fm-memo").value.trim()};
  if(fbEditId){
    const i=fbEntries.findIndex(x=>x.id===fbEditId);
    fbEntries[i]=entry;
  } else {
    fbEntries.push(entry);
    try{sendToSheets(entry);}catch(err){}
  }
  saveFbEntries();
  closeFeedbackModal();
  renderFeedbackStats();
  renderFeedback();
  showToast(fbEditId?"수정되었습니다":(localStorage.getItem(SHEETS_URL_KEY)?"저장됨 + 구글 시트 전송":"저장되었습니다"));
}
function exportFeedbackCSV(){if(!fbEntries.length){showToast("내보낼 데이터가 없습니다");return;}const headers=["파일명","테스터","회차","용어 수","파일 종류","일관성","원하는 용어 추출","AI 제공자","날짜","누락된 용어","불필요한 용어","개선 제안"];const rows=fbEntries.map(e=>[e.file,e.tester,e.run,e.cnt??"",FILETYPE_LABEL[e.filetype]||e.filetype||"",CONSIST_LABEL[e.consist],WANTED_LABEL[e.wanted],e.provider,e.date,e.missing||"",e.unnecessary||"",e.memo||""].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(","));dl("\uFEFF"+headers.join(",")+"\n"+rows.join("\n"),"glossary_feedback_"+new Date().toISOString().slice(0,10)+".csv","text/csv;charset=utf-8");showToast("CSV 내보내기 완료");}
</script>
</body>
</html>
